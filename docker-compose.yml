services:
  ph-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-https://api.geofal.com.pe}
        - VITE_CRM_LOGIN_URL=${VITE_CRM_LOGIN_URL:-https://crm.geofal.com.pe/login}
    expose:
      - "80"
    restart: always
    networks:
      - coolify

networks:
  coolify:
    external: true
